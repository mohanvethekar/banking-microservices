version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: Root@1234
      MYSQL_DATABASE: banking_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql   # ✅ PERSIST DATA
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  account-service:
    build: ./account-service
    container_name: account-service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy   # ✅ wait for DB
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/banking_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Root@1234
    restart: always

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy   # ✅ wait for DB
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/banking_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Root@1234

volumes:
  mysql_data:   # ✅ define volume